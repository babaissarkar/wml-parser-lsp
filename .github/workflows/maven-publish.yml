# This workflow will build a package using Maven
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

on: [push, pull_request, workflow_dispatch]

jobs:
  build-linux:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Build JAR
      run: ./mvnw -ntp -B clean package

    - name: Create bundled JRE with jlink
      run: |
        jlink \
          --add-modules java.base,java.logging,java.xml,java.desktop \
          --strip-debug \
          --no-header-files \
          --no-man-pages \
          --compress=2 \
          --output ./jre

    - name: Package ZIP (JAR + JRE)
      run: |
        mkdir -p zip-staging
        cp ./jar/wml.jar zip-staging/wml.jar
        cp -r ./jre zip-staging/jre
        cd zip-staging
        zip -r ../WML-linux.zip .

    - uses: actions/upload-artifact@v7
      with:
        name: wml.jar
        path: ./jar/wml.jar

    - uses: actions/upload-artifact@v7
      with:
        name: WML-linux.zip
        path: ./WML-linux.zip

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/master'
      with:
        tag_name: latest
        name: Latest Build
        files: ./jar/wml.jar

  build-windows:

    runs-on: windows-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Build JAR
      run: ./mvnw -ntp -B clean package

    - name: Create bundled JRE with jlink
      run: |
        jlink `
          --add-modules java.base,java.logging,java.xml,java.desktop `
          --strip-debug `
          --no-header-files `
          --no-man-pages `
          --compress=2 `
          --output ./jre

    - name: Package ZIP (JAR + JRE)
      run: |
        New-Item -ItemType Directory -Force -Path zip-staging
        Copy-Item ./jar/wml.jar zip-staging/wml.jar
        Copy-Item -Recurse ./jre zip-staging/jre
        Compress-Archive -Path zip-staging/* -DestinationPath WML-win.zip

    - uses: actions/upload-artifact@v7
      with:
        name: WML-win.zip
        path: ./WML-win.zip
